<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa thông tin</title>
    <style>
        .edit-btn {
            cursor: pointer;
            color: blue;
        }
    </style>
</head>

<body>
    <div>
        <label for="info">Thông tin của bạn: </label>
        <input type="text" id="info" value="Nhấn vào bút để chỉnh sửa" disabled>
        <span class="edit-btn" onclick="enableEdit()">✏️</span>
    </div>

    <script>
        function enableEdit() {
            var inputField = document.getElementById("info");
            inputField.disabled = false;  // Cho phép nhập thông tin
            inputField.focus();  // Đưa con trỏ vào ô nhập
        }

        // Khi người dùng nhấn ra ngoài ô input, vô hiệu hóa ô nhập lại
        document.getElementById("info").addEventListener("blur", function () {
            this.disabled = true;
        });
    </script>
</body>

</html>
